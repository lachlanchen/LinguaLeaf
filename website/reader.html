<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LinguaLeaf Reader</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  </head>
  <body class="reader-body">
    <header class="reader-toolbar">
      <a href="./" class="back-link">LinguaLeaf</a>
      <div class="reader-title">
        <strong id="reader-title">PDF Reader</strong>
        <span id="page-status">Loading...</span>
      </div>
      <div class="reader-actions">
        <button id="prev-page" type="button">Previous</button>
        <button id="next-page" type="button">Next</button>
        <a id="download-link" href="#" download>Download</a>
      </div>
    </header>
    <main class="reader-main">
      <canvas id="pdf-canvas" aria-label="PDF page"></canvas>
      <p id="reader-error" class="reader-error" hidden></p>
    </main>
    <script src="reader.js"></script>
  </body>
</html>
